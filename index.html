<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Der Schorlemeister – Das letzte Abenteuer</title>
  <link rel="icon" type="image/png" sizes="180x180" href="assets/images/ui/favicon_180.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/images/ui/favicon_64.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/ui/favicon_32.png">
  <link rel="apple-touch-icon" href="assets/images/ui/favicon_180.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    #game {
      width: 100vw;
      height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="errlog" style="position:fixed;top:0;left:0;z-index:9999;background:rgba(200,0,0,0.9);color:#fff;font:13px monospace;padding:6px;max-width:100vw;max-height:40vh;overflow:auto;display:none"></div>
  <script>
    window.onerror = (msg, src, line) => {
      const d = document.getElementById('errlog');
      d.style.display = 'block';
      d.innerHTML += `<div>${line}: ${msg}</div>`;
    };
    window.addEventListener('unhandledrejection', e => {
      const d = document.getElementById('errlog');
      d.style.display = 'block';
      d.innerHTML += `<div>Promise: ${e.reason}</div>`;
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script>
    // Spiel-Skripte mit Cache-Buster in Reihenfolge laden, dann starten.
    // So bekommt man Updates immer ohne hartes Neuladen (kein Strg+Shift+R nötig).
    // Phaser (CDN) und Bilder werden weiterhin normal gecacht.
    (function () {
      var bust = Date.now();
      var files = [
        'js/levels.js', 'js/IntroScene.js', 'js/MenuScene.js', 'js/GameScene.js',
        'js/HudScene.js', 'js/GameOverScene.js', 'js/WinScene.js',
      ];
      var i = 0;
      function next() {
        if (i >= files.length) { startGame(); return; }
        var s = document.createElement('script');
        s.src = files[i++] + '?v=' + bust;
        s.onload = next;
        s.onerror = function () {
          var d = document.getElementById('errlog');
          d.style.display = 'block';
          d.innerHTML += '<div>Laden fehlgeschlagen: ' + s.src + '</div>';
        };
        document.head.appendChild(s);
      }
      function startGame() {
        window.game = new Phaser.Game({
          type: Phaser.AUTO,
          width: 450,
          height: 800,
          parent: 'game',
          backgroundColor: '#2d6a2d',
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          audio: { pauseOnBlur: false },
          physics: {
            default: 'arcade',
            arcade: { gravity: { y: 900 }, debug: false },
          },
          scene: [IntroScene, MenuScene, GameScene, HudScene, GameOverScene, WinScene],
        });
      }
      next();
    })();
  </script>
</body>
</html>
